<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Chiến Sự - Huntkey Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #map { flex-grow: 1; width: 100%; border-radius: 0.5rem; z-index: 1; cursor: crosshair; }
        .leaflet-popup-content-wrapper { background-color: #1e293b; color: white; border: 1px solid #334155; }
        .leaflet-popup-tip { background-color: #1e293b; }
        .leaflet-popup-content h3 { color: #10b981; margin-top: 0; margin-bottom: 5px; font-weight: bold; font-size: 16px; }
        .leaflet-popup-content p { margin: 4px 0; font-size: 13px; color: #cbd5e1; }
        
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; }
        .badge.chot { background-color: #10b981; color: #064e3b; }
        .badge.ghetham { background-color: #f59e0b; color: #78350f; }
        .badge.moi { background-color: #3b82f6; color: #1e3a8a; }
        .badge.tu-choi { background-color: #ef4444; color: #7f1d1d; }

        .custom-marker { display: flex; justify-content: center; align-items: center; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid white; transition: transform 0.2s; }
        .custom-marker:hover { transform: scale(1.2); }
        .custom-marker i { font-size: 14px; color: white; }
        
        .temp-marker { border: 2px dashed #ffeb3b; background-color: rgba(0,0,0,0.5); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 235, 59, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 235, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 235, 59, 0); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <div class="mb-4 flex justify-between items-center bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-lg shrink-0">
        <div>
            <h1 class="text-2xl font-bold text-emerald-400"><i class="fa-solid fa-map-location-dot mr-2"></i>HUNTKEY ROUTE MANAGER</h1>
            <p class="text-sm text-slate-400">Hệ thống quản lý tuyến đi và điểm bán (Live)</p>
        </div>
        <div class="flex gap-4 text-sm font-semibold">
            <div class="flex items-center"><div class="w-3 h-3 rounded-full bg-emerald-500 mr-2"></div> Đã Lên Đơn (Khách Cũ)</div>
            <div class="flex items-center"><div class="w-3 h-3 rounded-full bg-amber-500 mr-2"></div> Đang Chăm Sóc</div>
            <div class="flex items-center"><div class="w-3 h-3 rounded-full bg-blue-500 mr-2"></div> Data Mới</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow flex gap-4 overflow-hidden h-full">
        <!-- Sidebar Panel -->
        <div class="w-96 bg-slate-800 rounded-lg p-0 border border-slate-700 flex flex-col overflow-hidden shrink-0 shadow-xl">
            
            <!-- Tabs -->
            <div class="flex border-b border-slate-700 shrink-0">
                <button id="tab-list-btn" onclick="switchTab('list')" class="flex-1 py-3 text-center font-bold text-emerald-400 border-b-2 border-emerald-400 bg-slate-800/50 hover:bg-slate-700 transition"><i class="fa-solid fa-list mr-2"></i>Theo Dõi Tuyến</button>
                <button id="tab-add-btn" onclick="switchTab('add')" class="flex-1 py-3 text-center font-bold text-slate-400 border-b-2 border-transparent hover:bg-slate-700 transition"><i class="fa-solid fa-plus-location mr-2"></i>Thêm Điểm Mới</button>
            </div>

            <!-- Tab Content: List & Filter -->
            <div id="tab-list" class="flex-1 flex flex-col overflow-hidden p-4">
                
                <!-- BỘ LỌC THEO NGÀY -->
                <div class="bg-slate-700 p-3 rounded-lg mb-4 border border-slate-600">
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">Lọc hiển thị theo ngày:</label>
                    <div class="flex gap-2">
                        <input type="date" id="filter-date" onchange="renderAll()" class="flex-1 bg-slate-800 border border-slate-600 text-white rounded px-2 py-1 text-sm focus:outline-none focus:border-emerald-500">
                        <button onclick="clearFilter()" class="bg-slate-600 hover:bg-slate-500 px-3 rounded text-sm text-white transition tooltip" title="Xem tất cả các ngày"><i class="fa-solid fa-filter-circle-xmark"></i></button>
                    </div>
                </div>

                <!-- CÁC NÚT VẼ TUYẾN -->
                <div class="flex flex-col gap-2 mb-4 shrink-0">
                    <button id="btn-draw-history" onclick="drawHistoryRoute()" class="w-full bg-amber-600 hover:bg-amber-500 text-white py-2 rounded font-bold text-sm transition shadow-lg border border-amber-500/50 flex justify-center items-center">
                        <i class="fa-solid fa-route mr-2"></i> Xem Tuyến Đã Đi (Dựa theo ngày lọc)
                    </button>
                    <button id="btn-draw-suggest" onclick="suggestRoute()" class="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-2 rounded font-bold text-sm transition shadow-lg border border-fuchsia-500/50 flex justify-center items-center">
                        <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Gợi Ý Tuyến Chăm Khách Cũ Tối Ưu
                    </button>
                </div>

                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-semibold text-xs text-slate-400 uppercase tracking-wider">Danh sách cửa hàng:</h3>
                    <span id="list-count" class="text-xs bg-slate-700 px-2 py-1 rounded text-emerald-400 font-bold">0 điểm</span>
                </div>
                
                <!-- List Container -->
                <div id="store-list" class="flex-1 overflow-y-auto flex flex-col gap-2 pr-2">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Tab Content: Add/Edit -->
            <div id="tab-add" class="hidden flex-1 flex flex-col overflow-y-auto p-4 bg-slate-800/50">
                
                <div class="bg-blue-900/20 border border-blue-500/30 rounded p-3 mb-4 text-sm text-blue-200">
                    <i class="fa-solid fa-hand-pointer mr-1"></i> <strong>Click trực tiếp</strong> lên bản đồ hoặc dùng ô tìm kiếm bên dưới để thả ghim.
                </div>

                <!-- Search Box -->
                <div class="flex gap-2 mb-4 shrink-0">
                    <input type="text" id="search-input" placeholder="Tìm tên đường, phường..." class="flex-1 bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                    <button onclick="searchAddress()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded text-sm font-bold transition"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <hr class="border-slate-700 mb-4">

                <!-- Form -->
                <form id="add-store-form" onsubmit="saveStore(event)" class="flex flex-col gap-3">
                    <input type="hidden" id="form-id">
                    <input type="hidden" id="form-lat">
                    <input type="hidden" id="form-lng">
                    
                    <div class="text-xs text-amber-400 mb-1" id="coords-display">Chưa chọn vị trí trên bản đồ</div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="block text-xs font-semibold text-slate-400 mb-1">Tên Cửa Hàng <span class="text-red-500">*</span></label>
                            <input type="text" id="form-name" required class="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="VD: Điện Nước Tuấn Anh">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-semibold text-slate-400 mb-1">Địa Chỉ <span class="text-red-500">*</span></label>
                            <input type="text" id="form-address" required class="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="VD: 15 Nguyễn Trãi">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">Ngày Đi <span class="text-red-500">*</span></label>
                            <input type="date" id="form-date" required class="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">Trạng Thái <span class="text-red-500">*</span></label>
                            <select id="form-status" class="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 appearance-none">
                                <option value="moi">🔵 Data Mới</option>
                                <option value="ghetham">🟠 Đang Chăm Sóc</option>
                                <option value="chot">🟢 Đã Đặt Kệ/Lên Đơn</option>
                                <option value="tu-choi">🔴 Từ chối</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-semibold text-slate-400 mb-1">Ghi Chú Trảo Đổi</label>
                            <input type="text" id="form-note" class="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="Khách nói gì...">
                        </div>
                    </div>

                    <button type="submit" id="btn-submit-form" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transition w-full uppercase text-sm tracking-wider">
                        <i class="fa-solid fa-floppy-disk mr-2"></i> Lưu Thông Tin
                    </button>
                    <button type="button" onclick="clearForm()" class="mt-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 rounded-lg transition w-full text-xs">
                        Hủy / Làm Sạch Form
                    </button>
                </form>

            </div>
        </div>

        <!-- The Map Container -->
        <div class="flex-1 relative rounded-lg overflow-hidden border border-slate-700 shadow-xl">
            <div id="map" class="absolute inset-0"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // Lấy ngày hôm nay
        const todayStr = new Date().toISOString().split('T')[0];
        
        // --- 1. DỮ LIỆU BAN ĐẦU (Kèm ngày đi) ---
        const defaultData = [
            { id: 1, name: "Thiết Bị Điện Bình Zo", address: "104A Phú Đô", lat: 21.0125, lng: 105.7663, status: "moi", date: "2026-03-01", note: "Chưa qua" },
            { id: 2, name: "Cửa Hàng Thành Hồng", address: "83 Phú Đô", lat: 21.0140, lng: 105.7650, status: "chot", date: todayStr, note: "Đã giao kệ" },
            { id: 3, name: "Cửa Hàng Xuân Thưởng", address: "226 Nguyễn Xiển", lat: 20.9850, lng: 105.8080, status: "chot", date: todayStr, note: "Nhập 5 triệu" },
            { id: 4, name: "Điện Nước Hoàng Nhung", address: "339 Nguyễn Khang", lat: 21.0250, lng: 105.8020, status: "chot", date: "2026-03-02", note: "Khách cũ 3 tháng trước" },
            { id: 5, name: "Đại Lý Toàn Hồng", address: "96 Nguyễn Khang", lat: 21.0180, lng: 105.8050, status: "ghetham", date: todayStr, note: "Hẹn sang tuần" },
            { id: 6, name: "Công Ty Hải Hà", address: "12 Khuất Duy Tiến", lat: 20.9950, lng: 105.7980, status: "tu-choi", date: todayStr, note: "Không bán dòng này" }
        ];

        let storeData = JSON.parse(localStorage.getItem('huntkeyStoreData_v2'));
        if (!storeData || storeData.length === 0) {
            storeData = defaultData;
            localStorage.setItem('huntkeyStoreData_v2', JSON.stringify(storeData));
        }

        let map, markersLayer, tempMarker;
        let routeLine = null; // Chứa đường line của tuyến vẽ
        let currentMode = 'list';

        // --- 2. KHỞI TẠO BẢN ĐỒ ---
        function initMap() {
            map = L.map('map').setView([21.0000, 105.7900], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 20
            }).addTo(map);

            markersLayer = L.layerGroup().addTo(map);

            map.on('click', function(e) {
                if(currentMode !== 'add') switchTab('add');
                placeTempMarker(e.latlng.lat, e.latlng.lng);
            });

            // Set default date filter to today
            document.getElementById('filter-date').value = todayStr;
            document.getElementById('form-date').value = todayStr;
            renderAll();
        }

        // --- 3. HIỂN THỊ DỮ LIỆU CÓ LỌC ---
        function createCustomIcon(status) {
            let bgColor = '#3b82f6'; let iconClass = 'fa-store';
            if (status === 'chot') { bgColor = '#10b981'; iconClass = 'fa-check'; }
            else if (status === 'ghetham') { bgColor = '#f59e0b'; iconClass = 'fa-shoe-prints'; }
            else if (status === 'tu-choi') { bgColor = '#ef4444'; iconClass = 'fa-xmark'; }

            return L.divIcon({
                className: 'custom-icon',
                html: `<div class="custom-marker" style="background-color: ${bgColor}; width: 32px; height: 32px;">
                        <i class="fa-solid ${iconClass}"></i>
                       </div>`,
                iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -16]
            });
        }

        function getStatusBadge(status) {
            if (status === 'chot') return '<span class="badge chot">Đã Lên Đơn</span>';
            if (status === 'ghetham') return '<span class="badge ghetham">Đang chăm sóc</span>';
            if (status === 'moi') return '<span class="badge moi">Data Mới</span>';
            return '<span class="badge tu-choi">Từ chối</span>';
        }

        function clearFilter() {
            document.getElementById('filter-date').value = '';
            removeCurrentRoute();
            renderAll();
        }

        function renderAll() {
            markersLayer.clearLayers();
            const listContainer = document.getElementById('store-list');
            listContainer.innerHTML = '';
            
            const filterDate = document.getElementById('filter-date').value;

            // Lọc data
            let displayData = storeData;
            if (filterDate) {
                displayData = storeData.filter(s => s.date === filterDate);
            }

            document.getElementById('list-count').innerText = `${displayData.length} điểm`;

            // Nếu đổi ngày lọc, ẩn tuyến đường cũ đi
            removeCurrentRoute();

            displayData.forEach(store => {
                const marker = L.marker([store.lat, store.lng], { icon: createCustomIcon(store.status) }).addTo(markersLayer);
                
                const popupHtml = `
                    <h3>${store.name}</h3>
                    <p><i class="fa-solid fa-location-dot w-4"></i> ${store.address}</p>
                    <p><i class="fa-solid fa-calendar-day w-4"></i> ${store.date || '---'} | <i class="fa-solid fa-comment-dots w-4 ml-1"></i> ${store.note || '---'}</p>
                    ${getStatusBadge(store.status)}
                    <div class="mt-3 flex justify-between border-t border-slate-600 pt-2">
                        <button onclick="editStore(${store.id})" class="text-blue-400 text-xs hover:text-blue-300 font-bold"><i class="fa-solid fa-pen-to-square"></i> Sửa</button>
                        <button onclick="deleteStore(${store.id})" class="text-red-400 text-xs hover:text-red-300 font-bold"><i class="fa-solid fa-trash-can"></i> Xóa</button>
                    </div>
                `;
                marker.bindPopup(popupHtml);

                let borderColor = store.status === 'chot' ? 'border-emerald-500/50' : 'border-slate-600';
                const listItem = document.createElement('div');
                listItem.className = `p-3 rounded bg-slate-700/50 border ${borderColor} flex flex-col gap-1 transition duration-200 group relative`;
                listItem.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="font-bold text-sm text-white truncate cursor-pointer hover:text-emerald-400" onclick="focusStore(${store.lat}, ${store.lng})">${store.name}</div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-700 pl-2">
                            <button onclick="editStore(${store.id})" class="text-blue-400 hover:text-blue-300"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteStore(${store.id})" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="text-xs text-slate-400 truncate cursor-pointer" onclick="focusStore(${store.lat}, ${store.lng})"><i class="fa-solid fa-location-dot text-slate-500"></i> ${store.address}</div>
                    <div class="flex justify-between items-center mt-1">
                        ${getStatusBadge(store.status)}
                        <span class="text-[10px] text-slate-500"><i class="fa-regular fa-clock"></i> ${store.date}</span>
                    </div>
                `;
                listContainer.appendChild(listItem);
            });
        }

        // --- 4. TÍNH NĂNG VẼ TUYẾN ĐÃ ĐI ---
        function removeCurrentRoute() {
            if (routeLine) {
                map.removeLayer(routeLine);
                routeLine = null;
                document.getElementById('btn-draw-history').innerHTML = '<i class="fa-solid fa-route mr-2"></i> Xem Tuyến Đã Đi (Dựa theo ngày lọc)';
                document.getElementById('btn-draw-history').className = "w-full bg-amber-600 hover:bg-amber-500 text-white py-2 rounded font-bold text-sm transition shadow-lg border border-amber-500/50 flex justify-center items-center";
                document.getElementById('btn-draw-suggest').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Gợi Ý Tuyến Chăm Khách Cũ Tối Ưu';
            }
        }

        function drawHistoryRoute() {
            if (routeLine) { removeCurrentRoute(); return; } // Nếu đang vẽ thì tắt đi

            const filterDate = document.getElementById('filter-date').value;
            let dataToDraw = filterDate ? storeData.filter(s => s.date === filterDate) : storeData;
            
            // Loại bỏ Data Mới (chưa đi)
            dataToDraw = dataToDraw.filter(s => s.status !== 'moi');

            if (dataToDraw.length < 2) return alert("Không đủ dữ liệu điểm đã ghé thăm trong ngày này để vẽ tuyến!");

            const latlngs = dataToDraw.map(s => [s.lat, s.lng]);

            routeLine = L.polyline(latlngs, {
                color: '#f59e0b', weight: 5, opacity: 0.8, dashArray: '10, 10', lineJoin: 'round'
            }).addTo(map);
            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

            // Đổi state nút
            const btn = document.getElementById('btn-draw-history');
            btn.innerHTML = '<i class="fa-solid fa-eye-slash mr-2"></i> Ẩn Tuyến Đã Đi';
            btn.className = "w-full bg-slate-600 hover:bg-slate-500 text-white py-2 rounded font-bold text-sm transition shadow-lg border border-slate-500/50 flex justify-center items-center";
        }

        // --- 5. TÍNH NĂNG GỢI Ý TUYẾN CHĂM SÓC KHÁCH CŨ (AI NEAREST NEIGHBOR) ---
        function suggestRoute() {
            removeCurrentRoute(); // Xóa tuyến cũ trước khi vẽ tuyến gợi ý
            
            // Lấy tất cả khách Đã chốt (Khách cũ)
            let oldCustomers = storeData.filter(s => s.status === 'chot');
            
            // Lọc bỏ những khách vừa mới đi hôm nay (Chỉ chăm sóc khách của các ngày trước)
            oldCustomers = oldCustomers.filter(s => s.date !== todayStr);

            if (oldCustomers.length < 2) return alert("Chưa có đủ Khách Cũ (Đã lên đơn vào các ngày trước) để tạo lộ trình chăm sóc!");

            // THUẬT TOÁN NEAREST NEIGHBOR (Sắp xếp lộ trình ngắn nhất)
            let unvisited = [...oldCustomers];
            let route = [];
            
            // Chọn điểm xuất phát là điểm đầu tiên trong mảng
            let current = unvisited.shift(); 
            route.push(current);

            while(unvisited.length > 0) {
                let closestIdx = 0;
                let minDistance = Infinity;
                let currentLatLng = L.latLng(current.lat, current.lng);

                // Tìm điểm gần nhất với điểm hiện tại
                for(let i=0; i<unvisited.length; i++) {
                    let dist = currentLatLng.distanceTo(L.latLng(unvisited[i].lat, unvisited[i].lng));
                    if(dist < minDistance) {
                        minDistance = dist;
                        closestIdx = i;
                    }
                }
                current = unvisited.splice(closestIdx, 1)[0];
                route.push(current);
            }

            // Vẽ Tuyến Đã Tối Ưu
            const latlngs = route.map(s => [s.lat, s.lng]);
            routeLine = L.polyline(latlngs, {
                color: '#d946ef', // Màu tím Fuchsia
                weight: 5, opacity: 0.9, lineJoin: 'round'
            }).addTo(map);
            
            // Tạo hoạt ảnh chạy dọc tuyến đường
            let dashOffset = 0;
            setInterval(() => {
                if(routeLine) {
                    dashOffset -= 10;
                    routeLine.setStyle({ dashArray: '15, 15', dashOffset: dashOffset });
                }
            }, 50);

            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

            // Hiện thông báo
            alert(`💡 GỢI Ý THÀNH CÔNG!\nHệ thống đã sắp xếp ${route.length} Khách Cũ theo thứ tự khoảng cách di chuyển ngắn nhất. (Đường màu Tím)`);
            document.getElementById('btn-draw-suggest').innerHTML = '<i class="fa-solid fa-eraser mr-2"></i> Xóa Tuyến Gợi Ý';
        }

        // --- 6. FORM LOGIC ---
        function placeTempMarker(lat, lng) {
            if(tempMarker) map.removeLayer(tempMarker);
            const tempIcon = L.divIcon({
                className: 'custom-icon', html: `<div class="custom-marker temp-marker" style="width: 30px; height: 30px;"><i class="fa-solid fa-location-crosshairs text-yellow-300"></i></div>`, iconSize: [30, 30], iconAnchor: [15, 15]
            });
            tempMarker = L.marker([lat, lng], {icon: tempIcon}).addTo(map);
            document.getElementById('form-lat').value = lat; document.getElementById('form-lng').value = lng;
            document.getElementById('coords-display').innerHTML = `<i class="fa-solid fa-location-dot"></i> Tọa độ: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            document.getElementById('coords-display').className = "text-xs text-emerald-400 font-bold mb-1";
        }

        function saveStore(e) {
            e.preventDefault();
            const id = document.getElementById('form-id').value;
            const lat = document.getElementById('form-lat').value;
            const lng = document.getElementById('form-lng').value;
            if(!lat || !lng) return alert("Bạn phải ghim một vị trí trên bản đồ trước!");

            const storeObj = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('form-name').value,
                address: document.getElementById('form-address').value,
                date: document.getElementById('form-date').value,
                status: document.getElementById('form-status').value,
                note: document.getElementById('form-note').value,
                lat: parseFloat(lat), lng: parseFloat(lng)
            };

            if (id) {
                const index = storeData.findIndex(s => s.id === parseInt(id));
                if (index !== -1) storeData[index] = storeObj;
                alert(`Đã cập nhật: ${storeObj.name}`);
            } else {
                storeData.push(storeObj);
                alert(`Đã thêm điểm mới thành công!`);
            }
            
            localStorage.setItem('huntkeyStoreData_v2', JSON.stringify(storeData));
            if(tempMarker) map.removeLayer(tempMarker);
            clearForm();
            
            // Xóa bộ lọc ngày để xem điểm vừa thêm
            document.getElementById('filter-date').value = storeObj.date;
            renderAll();
            switchTab('list');
        }

        function focusStore(lat, lng) {
            map.flyTo([lat, lng], 16);
            markersLayer.eachLayer(function(marker) {
                if (marker.getLatLng().lat === lat && marker.getLatLng().lng === lng) marker.openPopup();
            });
        }

        function editStore(id) {
            const store = storeData.find(s => s.id === id);
            if(!store) return;
            document.getElementById('form-id').value = store.id;
            document.getElementById('form-name').value = store.name;
            document.getElementById('form-address').value = store.address;
            document.getElementById('form-date').value = store.date || todayStr;
            document.getElementById('form-status').value = store.status;
            document.getElementById('form-note').value = store.note || '';
            
            map.flyTo([store.lat, store.lng], 16);
            placeTempMarker(store.lat, store.lng);
            document.getElementById('btn-submit-form').innerHTML = '<i class="fa-solid fa-pen-to-square mr-2"></i> Cập Nhật Điểm Bán';
            switchTab('add');
        }

        function deleteStore(id) {
            if(confirm("Xóa điểm bán này khỏi hệ thống?")) {
                storeData = storeData.filter(s => s.id !== id);
                localStorage.setItem('huntkeyStoreData_v2', JSON.stringify(storeData));
                renderAll();
            }
        }

        async function searchAddress() {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            const searchQuery = query.toLowerCase().includes('hà nội') ? query : query + ', Hà Nội';
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}`);
                const data = await response.json();
                if(data && data.length > 0) {
                    map.flyTo([parseFloat(data[0].lat), parseFloat(data[0].lon)], 16);
                    placeTempMarker(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    document.getElementById('form-address').value = data[0].display_name.split(',').slice(0, 3).join(',');
                } else alert("Không tìm thấy địa chỉ.");
            } catch (err) { alert("Lỗi kết nối tìm kiếm."); }
        }

        function clearForm() {
            document.getElementById('add-store-form').reset();
            document.getElementById('form-id').value = '';
            document.getElementById('form-date').value = todayStr;
            document.getElementById('btn-submit-form').innerHTML = '<i class="fa-solid fa-floppy-disk mr-2"></i> Lưu Thông Tin';
            document.getElementById('coords-display').innerHTML = "Chưa chọn vị trí trên bản đồ";
            if(tempMarker) map.removeLayer(tempMarker);
        }

        function switchTab(tab) {
            currentMode = tab;
            const tabListBtn = document.getElementById('tab-list-btn'); const tabAddBtn = document.getElementById('tab-add-btn');
            const tabList = document.getElementById('tab-list'); const tabAdd = document.getElementById('tab-add');
            if(tab === 'list') {
                tabListBtn.className = "flex-1 py-3 text-center font-bold text-emerald-400 border-b-2 border-emerald-400 bg-slate-800/50";
                tabAddBtn.className = "flex-1 py-3 text-center font-bold text-slate-400 border-b-2 border-transparent hover:bg-slate-700";
                tabList.classList.remove('hidden'); tabAdd.classList.add('hidden');
                if(tempMarker) map.removeLayer(tempMarker);
            } else {
                tabAddBtn.className = "flex-1 py-3 text-center font-bold text-emerald-400 border-b-2 border-emerald-400 bg-slate-800/50";
                tabListBtn.className = "flex-1 py-3 text-center font-bold text-slate-400 border-b-2 border-transparent hover:bg-slate-700";
                tabAdd.classList.remove('hidden'); tabList.classList.add('hidden');
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
